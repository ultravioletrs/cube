name: Deploy Cube Cloud Services

on:
  workflow_run:
    workflows: ["Create and publish Cube Proxy Docker image"]
    types:
      - completed
    branches:
      - main
      - cube-92

  # TODO: Remove push trigger before merging to main
  # This is for testing deployment on cube-92 branch
  push:
    branches:
      - cube-92

  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev

concurrency:
  group: deploy-cloud-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  DEPLOY_DIR: cube-cloud

jobs:
  deploy-cloud:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}

    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy Cube Cloud Services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CUBE_SERVER_IP }}
          port: 49200
          username: ${{ secrets.CUBE_SERVER_USERNAME }}
          key: ${{ secrets.CUBE_SERVER_KEY }}
          script_stop: true
          command_timeout: 200m
          script: |
            set -e

            echo "=== Cube Cloud Deployment Started ==="

            echo "Logging into GitHub Container Registry"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Changing directory to project"
            cd ${{ env.DEPLOY_DIR }}

            echo "Resetting files modified by previous deployment"
            # Only reset the specific files we modify with secrets
            git checkout HEAD -- docker/.env docker/cloud-compose.yaml docker/traefik/dynamic.toml 2>/dev/null || true

            echo "Checking out branch: ${{ github.ref_name }}"
            git fetch origin
            git checkout ${{ github.ref_name }} || git checkout -b ${{ github.ref_name }} origin/${{ github.ref_name }}

            echo "Pulling latest code from repository"
            git pull --rebase origin ${{ github.ref_name }}

            echo "Creating required directories and setting up SSL"
            cd docker
            echo "Entered docker"

            # Ensure traefik directories exist with correct permissions
            mkdir -p traefik/ssl/certs
            echo "Created traefik/ssl/certs directory"

            # Replace default admin password with secret
            if [ ! -z "${{ secrets.CUBE_ADMIN_PASSWORD }}" ]; then
              echo "Replacing default admin password with secret"
              sed -i 's/SMQ_USERS_ADMIN_PASSWORD="m2N2Lfno"/SMQ_USERS_ADMIN_PASSWORD="${{ secrets.CUBE_ADMIN_PASSWORD }}"/' .env
              echo "  ✓ Admin password updated"
            fi

              echo "Setting up acme.json for Traefik SSL"

            ACME_PATH="traefik/ssl/certs/acme.json"
            ACME_DIR="$(dirname "$ACME_PATH")"

            # Ensure directory exists
            mkdir -p "$ACME_DIR"

            # Quick diagnostics (so CI logs show what's going on if it fails)
            echo "  • whoami: $(whoami 2>/dev/null || true)"
            echo "  • id: $(id 2>/dev/null || true)"
            ls -ld "$ACME_DIR" || true

            # Fail early with a clear message if the directory isn't writable
            if [ ! -w "$ACME_DIR" ]; then
              echo "ERROR: $ACME_DIR is not writable"
              ls -ld "$ACME_DIR" || true
              exit 1
            fi

            # Create file if missing
            if [ ! -f "$ACME_PATH" ]; then
              echo "  • Creating acme.json"
              printf '{}' > "$ACME_PATH"
            fi

            # If file exists but is empty, initialize it
            if [ ! -s "$ACME_PATH" ]; then
              echo "  • Initializing empty acme.json"
              printf '{}' > "$ACME_PATH"
            fi

            # Set correct perms (Traefik expects 600). If this fails, print useful info.
            if ! chmod 600 "$ACME_PATH"; then
              echo "ERROR: chmod 600 failed for $ACME_PATH"
              ls -l "$ACME_PATH" || true
              ls -ld "$ACME_DIR" || true
              exit 1
            fi

            echo "  ✓ acme.json ready"
            ls -l "$ACME_PATH" || true

            # Ensure correct permissions
            chmod 600 traefik/ssl/certs/acme.json
            echo "  ✓ Set permissions (600) on acme.json"

            echo "Updating environment variables and configuration with secrets"
            # Replace placeholder with actual public URL from secrets
            sed -i "s|__CUBE_PUBLIC_URL__|${{ secrets.CUBE_PUBLIC_URL }}|g" .env
            # Replace placeholder with actual agent URL from secrets
            sed -i "s|__CUBE_AGENT_URL__|${{ secrets.CUBE_AGENT_URL }}|g" .env
            # Replace placeholder with actual domain from secrets
            sed -i "s|__CUBE_DOMAIN__|${{ secrets.CUBE_DOMAIN }}|g" cloud-compose.yaml
            sed -i "s|__CUBE_DOMAIN__|${{ secrets.CUBE_DOMAIN }}|g" traefik/dynamic.toml

            # Replace agent client cert paths (certs are mounted in the proxy container)
            # These paths refer to the mounted certs inside the container at /etc/cube/certs/
            sed -i "s|__CUBE_AGENT_CLIENT_CERT_PATH__|/etc/cube/certs/client.crt|g" .env
            sed -i "s|__CUBE_AGENT_CLIENT_KEY_PATH__|/etc/cube/certs/client.key|g" .env
            sed -i "s|__CUBE_AGENT_CLIENT_CA_PATH__|/etc/cube/certs/ca.pem|g" .env

            echo "Pulling latest Docker images"
            docker compose -f cloud-compose.yaml --profile cloud pull 2>&1

            echo "Stopping existing services"
            docker compose -f cloud-compose.yaml --profile cloud down 2>&1

            echo "Starting cloud services"
            docker compose -f cloud-compose.yaml --profile cloud up -d 2>&1

            echo "Waiting for services to start (30 seconds)..."
            sleep 30

            echo "Checking service status..."
            docker compose -f cloud-compose.yaml --profile cloud ps 2>&1

            echo "=== Verifying Critical Services ==="
            SERVICES="traefik opensearch nats spicedb auth users domains ui cube-proxy fluent-bit guardrails"
            ALL_RUNNING=true

            for SERVICE in $SERVICES; do
              if docker ps --format '{{.Names}}' | grep -q "cube-cloud-$SERVICE"; then
                echo "✓ Service $SERVICE is running"
              else
                echo "✗ Service $SERVICE is not running"
                ALL_RUNNING=false
              fi
            done

            if [ "$ALL_RUNNING" = false ]; then
              echo "Deployment verification failed!"
              docker compose -f cloud-compose.yaml --profile cloud logs --tail=50 2>&1
              exit 1
            fi

            echo "✓ All cloud services deployed successfully!"

            echo ""
            echo "=== Service URLs (All through Traefik Gateway) ==="
            echo "  - Cube UI: ${{ secrets.CUBE_PUBLIC_URL }}/"
            echo "  - Cube Proxy API: ${{ secrets.CUBE_PUBLIC_URL }}/proxy"
            echo "  - Traefik Dashboard: http://${{ secrets.CUBE_SERVER_IP }}:49212"
            echo ""
            echo "Note: HTTP automatically redirects to HTTPS"

      - name: System Cleanup
        if: always()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CUBE_SERVER_IP }}
          port: 49200
          username: ${{ secrets.CUBE_SERVER_USERNAME }}
          key: ${{ secrets.CUBE_SERVER_KEY }}
          script_stop: false
          command_timeout: 10m
          script: |
            echo "Running system cleanup..."
            docker system prune -a -f
            echo "✓ Cleanup completed"
