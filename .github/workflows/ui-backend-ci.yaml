name: Build and Publish Cube AI UI Backend Docker Image

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Cube repository
        uses: actions/checkout@v4
        with:
          path: cube

      - name: Checkout UI repository
        uses: actions/checkout@v4
        with:
          repository: absmach/magistrala-ui
          path: ui
          token: ${{ secrets.GITHUBPAT }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUBPAT }}

      - name: Build and Push Cube AI UI Backend Docker Image
        run: |
          cd ui
          make dockers_backend
          docker tag ${{ env.REGISTRY }}/absmach/magistrala/ui-backend:latest ${{ env.REGISTRY }}/ultravioletrs/cube/ui-backend:latest
          docker push ${{ env.REGISTRY }}/ultravioletrs/cube/ui-backend:latest
