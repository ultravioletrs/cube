# Cloud-init configuration for Cube Agent on Confidential VMs

package_update: true
package_upgrade: false

packages:
  - curl
  - git
  - golang-go
  - build-essential
  - net-tools

users:
  - name: cubeadmin
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    groups: sudo
  - name: ollama
    system: true
    home: /var/lib/ollama
    shell: /usr/sbin/nologin

write_files:
  - path: /etc/cube/agent.env
    content: |
      UV_CUBE_AGENT_LOG_LEVEL=info
      UV_CUBE_AGENT_HOST=0.0.0.0
      UV_CUBE_AGENT_PORT=7001
      UV_CUBE_AGENT_INSTANCE_ID=cube-agent-01
      UV_CUBE_AGENT_TARGET_URL=http://localhost:11434
    permissions: '0644'

  - path: /etc/systemd/system/ollama.service
    content: |
      [Unit]
      Description=Ollama Service
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User=ollama
      Group=ollama
      Environment="OLLAMA_HOST=0.0.0.0:11434"
      ExecStart=/usr/local/bin/ollama serve
      Restart=always
      RestartSec=3

      [Install]
      WantedBy=multi-user.target
    permissions: '0644'

  - path: /etc/systemd/system/cube-agent.service
    content: |
      [Unit]
      Description=Cube Agent Service
      After=network-online.target ollama.service
      Wants=network-online.target

      [Service]
      Type=simple
      EnvironmentFile=/etc/cube/agent.env
      ExecStart=/usr/local/bin/cube-agent
      Restart=on-failure
      RestartSec=5
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target
    permissions: '0644'

  - path: /usr/local/bin/pull-ollama-models.sh
    content: |
      #!/bin/bash
      # Wait for ollama to be ready
      echo "Waiting for Ollama to be ready..."
      for i in $(seq 1 60); do
        if curl -s http://localhost:11434/api/version > /dev/null 2>&1; then
          echo "Ollama is ready!"
          break
        fi
        sleep 2
      done

      # Pull default model
      echo "Pulling tinyllama model..."
      /usr/local/bin/ollama pull tinyllama:1.1b
      echo "Model pull complete!"
    permissions: '0755'

runcmd:
  # Create directories
  - mkdir -p /etc/cube /var/lib/ollama /var/log/cube

  # Set ownership
  - chown -R ollama:ollama /var/lib/ollama

  # Install Ollama
  - echo "Installing Ollama..."
  - curl -fsSL https://ollama.com/install.sh | sh

  # Start Ollama service
  - systemctl daemon-reload
  - systemctl enable ollama
  - systemctl start ollama

  # Wait for Ollama to initialize
  - sleep 5

  # Pull models in background
  - echo "Starting model download in background..."
  - nohup /usr/local/bin/pull-ollama-models.sh > /var/log/cube/ollama-pull.log 2>&1 &

  # Clone and build Cube Agent
  - echo "Building Cube Agent..."
  - cd /tmp
  - git clone https://github.com/ultravioletrs/cube.git
  - cd cube
  - /usr/bin/go build -ldflags="-s -w" -o /tmp/cube-agent ./cmd/agent
  - mv /tmp/cube-agent /usr/local/bin/cube-agent
  - chmod +x /usr/local/bin/cube-agent

  # Start Cube Agent service
  - systemctl daemon-reload
  - systemctl enable cube-agent
  - systemctl start cube-agent

  # Log completion
  - echo "Cube Agent setup complete!" | tee -a /var/log/cube/setup.log

final_message: "Cube Agent and Ollama services started. Access Cube Agent at http://<IP>:7001"
