#
# Cloud-init for local QEMU AMD SEV-SNP VMs (Coconut SVSM)
# Used by: qemu.sh prepare_snp / start_snp
# For cloud deployments (GCP/Azure), see cloud/ directory instead

package_update: true
package_upgrade: false

growpart:
  mode: auto
  devices: ["/"]
  ignore_growroot_disabled: false

resize_rootfs: true

users:
  - name: ultraviolet
    plain_text_passwd: password
    lock_passwd: false
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
  - name: ollama
    system: true
    home: /var/lib/ollama
    shell: /usr/sbin/nologin

ssh_pwauth: true

packages:
  - curl
  - git
  - build-essential

write_files:
  - path: /etc/cube/agent.env
    content: |
      UV_CUBE_AGENT_LOG_LEVEL=info
      UV_CUBE_AGENT_HOST=0.0.0.0
      UV_CUBE_AGENT_PORT=7001
      UV_CUBE_AGENT_INSTANCE_ID=cube-agent-01
      UV_CUBE_AGENT_TARGET_URL=http://localhost:11434
      UV_CUBE_AGENT_SERVER_CERT=/etc/cube/certs/server.crt
      UV_CUBE_AGENT_SERVER_KEY=/etc/cube/certs/server.key
      UV_CUBE_AGENT_SERVER_CA_CERTS=/etc/cube/certs/ca.crt
      UV_CUBE_AGENT_CA_URL=https://prism.ultraviolet.rs/am-certs
      # SNP-specific settings
      AGENT_OS_TYPE=snp
      AGENT_VMPL=2
    permissions: '0644'
  - path: /etc/systemd/system/ollama.service
    content: |
      [Unit]
      Description=Ollama Service
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User=ollama
      Group=ollama
      Environment="OLLAMA_HOST=0.0.0.0:11434"
      ExecStart=/usr/local/bin/ollama serve
      Restart=always
      RestartSec=3

      [Install]
      WantedBy=multi-user.target
    permissions: '0644'
  - path: /etc/systemd/system/cube-agent.service
    content: |
      [Unit]
      Description=Cube Agent Service
      After=network-online.target ollama.service
      Wants=network-online.target

      [Service]
      Type=simple
      EnvironmentFile=/etc/cube/agent.env
      ExecStart=/usr/local/bin/cube-agent
      Restart=on-failure
      RestartSec=5
      StartLimitBurst=5
      StartLimitIntervalSec=60

      [Install]
      WantedBy=multi-user.target
    permissions: '0644'
  - path: /usr/local/bin/pull-ollama-models.sh
    content: |
      #!/bin/bash
      # Wait for ollama to be ready
      for i in $(seq 1 60); do
        if curl -s http://localhost:11434/api/version > /dev/null 2>&1; then
          break
        fi
        sleep 2
      done
      # Pull models
      /usr/local/bin/ollama pull tinyllama:1.1b
      /usr/local/bin/ollama pull starcoder2:3b
      /usr/local/bin/ollama pull nomic-embed-text:v1.5
    permissions: '0755'
  - path: /etc/modules-load.d/sev-snp.conf
    content: |
      # AMD SEV-SNP guest modules
      sev-guest
      ccp
    permissions: '0644'

runcmd:
  - |
    # Install custom SNP-compatible kernel from seed image if present
    mkdir -p /mnt/seed
    dev="$(blkid -L cidata || blkid -L CIDATA || true)"
    if [ -n "$dev" ]; then
      mount "$dev" /mnt/seed
      if ls /mnt/seed/debs/*.deb 2>/dev/null; then
        cp /mnt/seed/debs/*.deb /root/
        dpkg -i /root/*.deb || apt-get -y -f install
        update-grub
        sync
      fi
      umount /mnt/seed || true
    fi
  - echo 'ultraviolet:password' | chpasswd
  - |
    cat > /etc/ssh/sshd_config.d/60-cloudimg-settings.conf << 'SSHEOF'
    PasswordAuthentication yes
    SSHEOF
  - systemctl restart sshd
  - sleep 2
  # SEV-SNP Setup (local only — not needed on cloud providers like GCP/Azure
  # which handle SEV-SNP at the hypervisor level)
  - |
    # Load SEV-SNP guest modules (local deployment only)
    modprobe ccp 2>/dev/null || echo "CCP module not available"
    modprobe sev-guest 2>/dev/null || echo "sev-guest module not available"
    # Verify SEV-SNP guest support
    if [ -e /dev/sev-guest ]; then
      echo "SEV-SNP: Running inside an SEV-SNP protected VM"
      echo "SEV-SNP attestation available via /dev/sev-guest"
    else
      echo "SEV-SNP: /dev/sev-guest not detected (expected on cloud providers)"
    fi
  - mkdir -p /etc/cube
  - mkdir -p /etc/cube/certs
  - |
    # Generate CA certificate
    openssl req -x509 -newkey rsa:4096 -keyout /etc/cube/certs/ca.key -out /etc/cube/certs/ca.crt -days 365 -nodes -subj "/CN=Cube-CA"
    # Generate server certificate
    openssl req -newkey rsa:4096 -keyout /etc/cube/certs/server.key -out /etc/cube/certs/server.csr -nodes -subj "/CN=cube-agent"
    openssl x509 -req -in /etc/cube/certs/server.csr -CA /etc/cube/certs/ca.crt -CAkey /etc/cube/certs/ca.key -CAcreateserial -out /etc/cube/certs/server.crt -days 365
    # Generate client certificate for mTLS
    openssl req -newkey rsa:4096 -keyout /etc/cube/certs/client.key -out /etc/cube/certs/client.csr -nodes -subj "/CN=cube-client"
    openssl x509 -req -in /etc/cube/certs/client.csr -CA /etc/cube/certs/ca.crt -CAkey /etc/cube/certs/ca.key -CAcreateserial -out /etc/cube/certs/client.crt -days 365
    # Set permissions
    chmod 600 /etc/cube/certs/*.key
    chmod 644 /etc/cube/certs/*.crt
  - mkdir -p /var/lib/ollama
  - mkdir -p /home/ollama/.ollama
  - chown -R ollama:ollama /var/lib/ollama
  - chown -R ollama:ollama /home/ollama
  - curl -fsSL https://ollama.com/install.sh | sh
  - |
    # Install Go (required version from go.mod)
    GO_VERSION=$(curl -fsSL https://go.dev/VERSION?m=text | head -1 | sed 's/go//')
    curl -fsSL https://dl.google.com/go/go${GO_VERSION}.linux-amd64.tar.gz -o /tmp/go.tar.gz
    rm -rf /usr/local/go
    tar -C /usr/local -xzf /tmp/go.tar.gz
    rm /tmp/go.tar.gz
  - git clone https://github.com/ultravioletrs/cube.git /tmp/cube
  - cd /tmp/cube && git fetch origin pull/88/head:pr-88 && git checkout pr-88
  - export HOME=/root
  - cd /tmp/cube && /usr/local/go/bin/go build -ldflags="-s -w" -o /usr/local/bin/cube-agent ./cmd/agent
  - systemctl daemon-reload
  - systemctl enable ollama.service
  - systemctl start ollama.service
  - systemctl enable cube-agent.service
  - systemctl start cube-agent.service
  - nohup /usr/local/bin/pull-ollama-models.sh > /var/log/ollama-pull.log 2>&1 &

final_message: "Cube Agent (SEV-SNP) and Ollama services started."
