# Production Cube stack: Traefik TLS edge, ATOM identity, Ollama backend,
# guardrails, audit pipeline (OpenSearch + Fluent Bit) and the Cube services.
# Attestation (aTLS) is TEE-only and opt-in via ATTESTED_TLS in .env.

name: cube

networks:
  cube-net:
    driver: bridge

volumes:
  atom-db:
  proxy-db:
  embedder-db:
  embedder-uploads:
  guardrails-db:
  ollama:
  opensearch-data:

services:
  # ── Edge ───────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.1.2
    restart: unless-stopped
    ports:
      - ${TRAEFIK_HTTP_PORT}:80
      - ${TRAEFIK_HTTPS_PORT}:443
      - ${TRAEFIK_DASHBOARD_PORT}:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../traefik/traefik.toml:/etc/traefik/traefik.toml:ro
      - ../traefik/dynamic.toml:/etc/traefik/dynamic.toml:ro
      - ../traefik/ssl:/etc/traefik/ssl
    networks: [cube-net]

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    networks: [cube-net]

  # ── Identity (ATOM) ────────────────────────────────────────────────
  atom-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ATOM_DB_USER}
      POSTGRES_PASSWORD: ${ATOM_DB_PASS}
      POSTGRES_DB: ${ATOM_DB_NAME}
    volumes:
      - atom-db:/var/lib/postgresql/data
    networks: [cube-net]
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER"']
      interval: 5s
      timeout: 5s
      retries: 10

  atom:
    image: ghcr.io/absmach/atom:latest
    restart: unless-stopped
    depends_on:
      atom-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${ATOM_DB_USER}:${ATOM_DB_PASS}@atom-db:5432/${ATOM_DB_NAME}
      LISTEN_ADDR: 0.0.0.0:8080
      GRPC_ADDR: 0.0.0.0:8081
      ADMIN_SECRET: ${ATOM_ADMIN_SECRET}
      ATOM_CERTS_ENABLED: ${ATOM_CERTS_ENABLED}
      ATOM_CERTS_CA_MODE: file_intermediate_issuer
      ATOM_CERTS_ROOT_CA_CERT_PATH: /certs/root-ca.crt
      ATOM_CERTS_INTERMEDIATE_CA_CERT_PATH: /certs/intermediate-ca.crt
      ATOM_CERTS_INTERMEDIATE_CA_KEY_PATH: /certs/intermediate-ca.key
      ATOM_PUBLIC_BASE_URL: https://${CUBE_DOMAIN}
      ATOM_CORS_ALLOWED_ORIGINS: https://${CUBE_DOMAIN}
      RUST_LOG: info
    volumes:
      - ../certs:/certs:ro
    networks: [cube-net]

  atom-ui:
    image: ghcr.io/absmach/atom-ui:latest
    restart: unless-stopped
    depends_on:
      - atom
    environment:
      ATOM_GRAPHQL_URL: https://${CUBE_DOMAIN}/graphql
    networks: [cube-net]

  # ── LLM backend (Ollama) ───────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama
    networks: [cube-net]

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull ${LLM_MODEL} && ollama pull ${EMBEDDING_MODEL}"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    networks: [cube-net]
    restart: "no"

  # ── Audit pipeline ─────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks: [cube-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  opensearch-init:
    image: curlimages/curl:8.17.0
    depends_on:
      opensearch:
        condition: service_healthy
    volumes:
      - ../opensearch-index-template.json:/tmp/index-template.json:ro
    command: >
      sh -c 'curl -fsS -X PUT "http://opensearch:9200/_index_template/cube-audit-template" -H "Content-Type: application/json" -d @/tmp/index-template.json'
    networks: [cube-net]
    restart: "no"

  fluent-bit:
    image: fluent/fluent-bit:2.2
    restart: unless-stopped
    depends_on:
      opensearch:
        condition: service_healthy
      opensearch-init:
        condition: service_completed_successfully
    volumes:
      - ../fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ../parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [cube-net]

  # ── Guardrails ─────────────────────────────────────────────────────
  guardrails-db:
    image: postgres:16.2-alpine
    restart: on-failure
    environment:
      POSTGRES_USER: ${GUARDRAILS_DB_USER}
      POSTGRES_PASSWORD: ${GUARDRAILS_DB_PASS}
      POSTGRES_DB: ${GUARDRAILS_DB_NAME}
    volumes:
      - guardrails-db:/var/lib/postgresql/data
    networks: [cube-net]

  guardrails:
    image: ghcr.io/ultravioletrs/cube/guardrails:${CUBE_TAG}
    restart: unless-stopped
    depends_on:
      - guardrails-db
    environment:
      PYTHONPATH: /app
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: "8001"
      UVICORN_LOG_LEVEL: info
      HF_HOME: /app/cache
      UV_GUARDRAILS_DB_HOST: guardrails-db
      UV_GUARDRAILS_DB_PORT: "5432"
      UV_GUARDRAILS_DB_USER: ${GUARDRAILS_DB_USER}
      UV_GUARDRAILS_DB_PASS: ${GUARDRAILS_DB_PASS}
      UV_GUARDRAILS_DB_NAME: ${GUARDRAILS_DB_NAME}
    volumes:
      - ../../guardrails/rails:/app/rails:ro
    networks: [cube-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/guardrails/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Image embedding sidecar ────────────────────────────────────────
  image-embedder:
    image: ghcr.io/ultravioletrs/cube/image-embedder:${CUBE_TAG}
    restart: on-failure
    networks: [cube-net]

  # ── Cube agent ─────────────────────────────────────────────────────
  cube-agent:
    image: ghcr.io/ultravioletrs/cube/agent:${CUBE_TAG}
    restart: on-failure
    depends_on:
      - atom
      - ollama
    environment:
      UV_CUBE_AGENT_LOG_LEVEL: info
      UV_CUBE_AGENT_HOST: 0.0.0.0
      UV_CUBE_AGENT_PORT: "8901"
      UV_CUBE_AGENT_TARGET_URL: http://ollama:11434
      UV_CUBE_AGENT_CERTS_TOKEN: ${ATOM_CERTS_TOKEN}
      UV_CUBE_AGENT_ENTITY_ID: ${ATOM_ENTITY_ID}
      ATOM_GRPC_URL: atom:8081
      ATOM_GRAPHQL_URL: http://atom:8080/graphql
    networks: [cube-net]

  # ── Cube proxy ─────────────────────────────────────────────────────
  proxy-db:
    image: postgres:16-alpine
    restart: on-failure
    environment:
      POSTGRES_USER: ${PROXY_DB_USER}
      POSTGRES_PASSWORD: ${PROXY_DB_PASS}
      POSTGRES_DB: ${PROXY_DB_NAME}
    volumes:
      - proxy-db:/var/lib/postgresql/data
    networks: [cube-net]
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER"']
      interval: 5s
      timeout: 5s
      retries: 10

  cube-proxy:
    image: ghcr.io/ultravioletrs/cube/proxy:${CUBE_TAG}
    restart: on-failure
    depends_on:
      atom:
        condition: service_started
      proxy-db:
        condition: service_healthy
      cube-agent:
        condition: service_started
      fluent-bit:
        condition: service_started
    environment:
      UV_CUBE_PROXY_LOG_LEVEL: info
      UV_CUBE_PROXY_HOST: 0.0.0.0
      UV_CUBE_PROXY_PORT: "8900"
      UV_CUBE_PROXY_ROUTER_CONFIG: /etc/cube/proxy/config.json
      UV_CUBE_AGENT_URL: http://cube-agent:8901
      UV_CUBE_AGENT_ATTESTED_TLS: ${ATTESTED_TLS}
      UV_CUBE_AGENT_SERVER_CA_CERTS: /etc/cube/atom-certs/root-ca.crt
      ATOM_GRPC_URL: atom:8081
      ATOM_GRAPHQL_URL: http://atom:8080/graphql
      UV_CUBE_PROXY_DB_HOST: proxy-db
      UV_CUBE_PROXY_DB_PORT: "5432"
      UV_CUBE_PROXY_DB_USER: ${PROXY_DB_USER}
      UV_CUBE_PROXY_DB_PASS: ${PROXY_DB_PASS}
      UV_CUBE_PROXY_DB_NAME: ${PROXY_DB_NAME}
      UV_CUBE_PROXY_DB_SSL_MODE: disable
    volumes:
      - ./config.json:/etc/cube/proxy/config.json:ro
      - ../certs:/etc/cube/atom-certs:ro
    networks: [cube-net]

  # ── Cube embedder (RAG) ────────────────────────────────────────────
  embedder-db:
    image: pgvector/pgvector:pg16
    restart: on-failure
    environment:
      POSTGRES_USER: ${EMBEDDER_DB_USER}
      POSTGRES_PASSWORD: ${EMBEDDER_DB_PASS}
      POSTGRES_DB: ${EMBEDDER_DB_NAME}
    volumes:
      - embedder-db:/var/lib/postgresql/data
    networks: [cube-net]
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER"']
      interval: 5s
      timeout: 5s
      retries: 10

  cube-embedder:
    image: ghcr.io/ultravioletrs/cube/embedder:${CUBE_TAG}
    restart: on-failure
    depends_on:
      atom:
        condition: service_started
      embedder-db:
        condition: service_healthy
    environment:
      EMBEDDER_HTTP_ADDR: ":8082"
      EMBEDDER_LOG_LEVEL: info
      EMBEDDER_DB_URL: postgres://${EMBEDDER_DB_USER}:${EMBEDDER_DB_PASS}@embedder-db:5432/${EMBEDDER_DB_NAME}?sslmode=disable
      EMBEDDER_AUTH_GRPC_URL: atom:8081
      EMBEDDER_LLM_PROVIDER: ollama
      EMBEDDER_LLM_BASE_URL: http://ollama:11434
      EMBEDDER_LLM_MODEL: ${LLM_MODEL}
      EMBEDDER_OLLAMA_BASE_URL: http://ollama:11434
      EMBEDDER_EMBEDDING_DEFAULT_PROFILE: text
      EMBEDDER_EMBEDDING_TEXT_PROVIDER: ollama
      EMBEDDER_EMBEDDING_TEXT_BASE_URL: http://ollama:11434
      EMBEDDER_EMBEDDING_TEXT_MODEL: ${EMBEDDING_MODEL}
      EMBEDDER_EMBEDDING_TEXT_DIMENSIONS: "768"
      EMBEDDER_IMAGE_EMBEDDING_URL: http://image-embedder:8090
      EMBEDDER_OBJECT_STORAGE_PROVIDER: local
      EMBEDDER_UPLOAD_DIR: /tmp/embedder/uploads
      EMBEDDER_GUARDRAILS_URL: http://guardrails:8001
    volumes:
      - embedder-uploads:/tmp/embedder/uploads
    networks: [cube-net]

  # ── Web UI ─────────────────────────────────────────────────────────
  ui:
    image: ghcr.io/ultravioletrs/cube/ui:${CUBE_TAG}
    build:
      context: ../../ui
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - cube-proxy
      - atom-ui
    environment:
      CUBE_PROXY_TARGET: http://cube-proxy:8900
      VITE_CUBE_PROXY_URL: https://${CUBE_DOMAIN}
      VITE_ATOM_API_URL: https://${CUBE_DOMAIN}
      VITE_ATOM_GRAPHQL_URL: https://${CUBE_DOMAIN}/graphql
      VITE_ATOM_UI_URL: https://${CUBE_DOMAIN}/atom
    networks: [cube-net]
