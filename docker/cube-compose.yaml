volumes:
  opensearch-data:
  cube-proxy-db-volume:
  cube-embedder-db-volume:
  cube-embedder-upload-volume:
  cube-guardrails-db-volume:

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    profiles:
      - cloud
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - cube-network
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: opensearch
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - cube-network
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  opensearch-init:
    image: curlimages/curl:8.17.0
    container_name: opensearch-init
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - cube-network
    volumes:
      - ./opensearch-index-template.json:/tmp/index-template.json:ro
    command: >
      sh -c 'curl -fsS -X PUT "http://opensearch:9200/_index_template/cube-audit-template" -H "Content-Type: application/json" -d @/tmp/index-template.json'
    restart: "no"

  fluent-bit:
    image: fluent/fluent-bit:2.2
    container_name: fluent-bit
    volumes:
      - ./fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      opensearch:
        condition: service_healthy
      opensearch-init:
        condition: service_completed_successfully
    networks:
      - cube-network
    restart: unless-stopped

  cube-guardrails-db:
    image: postgres:16.2-alpine
    container_name: cube-guardrails-db
    restart: on-failure
    environment:
      POSTGRES_USER: ${UV_GUARDRAILS_DB_USER:-guardrails}
      POSTGRES_PASSWORD: ${UV_GUARDRAILS_DB_PASS:-guardrails}
      POSTGRES_DB: ${UV_GUARDRAILS_DB_NAME:-guardrails}
    networks:
      - cube-network
    volumes:
      - cube-guardrails-db-volume:/var/lib/postgresql/data

  cube-guardrails:
    container_name: guardrails
    image: ghcr.io/ultravioletrs/cube/guardrails:latest
    user: root
    command:
      - sh
      - -c
      - |
        if ! python -c 'import dataclasses_json' >/dev/null 2>&1; then
          pip install --no-cache-dir dataclasses-json==0.6.7
        fi
        exec su guardrails -s /bin/sh -c 'uvicorn main:app --host "$${UVICORN_HOST:-0.0.0.0}" --port "$${UVICORN_PORT:-8001}" --log-level "$${UVICORN_LOG_LEVEL:-info}"'
    networks:
      - cube-network
    restart: unless-stopped
    depends_on:
      - cube-guardrails-db
    environment:
      PYTHONPATH: /app
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 8001
      UVICORN_LOG_LEVEL: info
      TRANSFORMERS_CACHE: /app/cache
      HF_HOME: /app/cache
      XDG_CACHE_HOME: /app/cache
      UV_GUARDRAILS_DB_HOST: ${UV_GUARDRAILS_DB_HOST:-cube-guardrails-db}
      UV_GUARDRAILS_DB_PORT: ${UV_GUARDRAILS_DB_PORT:-5432}
      UV_GUARDRAILS_DB_USER: ${UV_GUARDRAILS_DB_USER:-guardrails}
      UV_GUARDRAILS_DB_PASS: ${UV_GUARDRAILS_DB_PASS:-guardrails}
      UV_GUARDRAILS_DB_NAME: ${UV_GUARDRAILS_DB_NAME:-guardrails}
    volumes:
      - ../guardrails/rails:/app/rails:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/guardrails/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      logging: "guardrails"
      service: "guardrails"

  cube-agent:
    container_name: cube-agent
    image: ghcr.io/ultravioletrs/cube/agent:latest
    profiles: ["default", "ollama", "vllm"]
    restart: on-failure
    networks:
      - cube-network
    environment:
      UV_CUBE_AGENT_LOG_LEVEL: ${UV_CUBE_AGENT_LOG_LEVEL:-info}
      UV_CUBE_AGENT_HOST: ${UV_CUBE_AGENT_HOST:-0.0.0.0}
      UV_CUBE_AGENT_PORT: ${UV_CUBE_AGENT_PORT:-8901}
      UV_CUBE_AGENT_SERVER_CERT: ${UV_CUBE_AGENT_SERVER_CERT:-}
      UV_CUBE_AGENT_SERVER_KEY: ${UV_CUBE_AGENT_SERVER_KEY:-}
      UV_CUBE_AGENT_INSTANCE_ID: ${UV_CUBE_AGENT_INSTANCE_ID:-}
      UV_CUBE_AGENT_TARGET_URL: ${UV_CUBE_AGENT_TARGET_URL:-http://ollama:11434}
      UV_CUBE_AGENT_CERTS_TOKEN: ${UV_CUBE_AGENT_CERTS_TOKEN:-}
      UV_CUBE_AGENT_ENTITY_ID: ${UV_CUBE_AGENT_ENTITY_ID:-}
      ATOM_GRPC_URL: ${ATOM_GRPC_URL:-atom:8081}
      ATOM_GRAPHQL_URL: ${ATOM_GRAPHQL_URL:-http://atom:8080/graphql}
      ATOM_TIMEOUT: ${ATOM_TIMEOUT:-15s}
    depends_on:
      - fluent-bit
      - atom
    ports:
      - ${UV_CUBE_AGENT_PORT:-8901}:${UV_CUBE_AGENT_PORT:-8901}
    labels:
      logging: "cube-agent"
      service: "agent"

  cube-proxy-db:
    image: postgres:16.1-alpine
    container_name: cube-proxy-db
    restart: on-failure
    environment:
      POSTGRES_USER: ${UV_CUBE_PROXY_DB_USER:-cube}
      POSTGRES_PASSWORD: ${UV_CUBE_PROXY_DB_PASS:-cube}
      POSTGRES_DB: ${UV_CUBE_PROXY_DB_NAME:-cube-proxy}
    networks:
      - cube-network
    volumes:
      - cube-proxy-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER"']
      interval: 5s
      timeout: 5s
      retries: 10

  cube-embedder-db:
    image: pgvector/pgvector:pg16
    container_name: cube-embedder-db
    restart: on-failure
    environment:
      POSTGRES_USER: ${EMBEDDER_DB_USER:-veda}
      POSTGRES_PASSWORD: ${EMBEDDER_DB_PASS:-veda}
      POSTGRES_DB: ${EMBEDDER_DB_NAME:-veda}
    networks:
      - cube-network
    volumes:
      - cube-embedder-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER"']
      interval: 5s
      timeout: 5s
      retries: 10

  cube-embedder:
    container_name: cube-embedder
    image: ghcr.io/ultravioletrs/cube/embedder:latest
    restart: on-failure
    networks:
      - cube-network
    depends_on:
      atom:
        condition: service_started
      cube-embedder-db:
        condition: service_healthy
    environment:
      EMBEDDER_HTTP_ADDR: ${EMBEDDER_HTTP_ADDR:-:8082}
      EMBEDDER_DB_URL: postgres://${EMBEDDER_DB_USER:-veda}:${EMBEDDER_DB_PASS:-veda}@cube-embedder-db:5432/${EMBEDDER_DB_NAME:-veda}?sslmode=disable
      EMBEDDER_AUTH_GRPC_URL: ${EMBEDDER_AUTH_GRPC_URL:-atom:8081}
      EMBEDDER_GOOGLE_OAUTH_CLIENT_ID: ${EMBEDDER_GOOGLE_OAUTH_CLIENT_ID:-}
      EMBEDDER_GOOGLE_OAUTH_CLIENT_SECRET: ${EMBEDDER_GOOGLE_OAUTH_CLIENT_SECRET:-}
      EMBEDDER_EMBEDDING_DEFAULT_PROFILE: ${EMBEDDER_EMBEDDING_DEFAULT_PROFILE:-text}
      EMBEDDER_EMBEDDING_PROFILE_BY_SOURCE_TYPE: '${EMBEDDER_EMBEDDING_PROFILE_BY_SOURCE_TYPE:-{}}'
      EMBEDDER_EMBEDDING_PROFILE_BY_RECORD_FORMAT: '${EMBEDDER_EMBEDDING_PROFILE_BY_RECORD_FORMAT:-{"text":"text","md":"text","pdf":"text","docx":"text","link":"text","code":"code","image":"image"}}'
      EMBEDDER_EMBEDDING_TEXT_PROVIDER: ${EMBEDDER_EMBEDDING_TEXT_PROVIDER:-ollama}
      EMBEDDER_EMBEDDING_TEXT_BASE_URL: ${EMBEDDER_EMBEDDING_TEXT_BASE_URL:-http://ollama:11434}
      EMBEDDER_EMBEDDING_TEXT_MODEL: ${EMBEDDER_EMBEDDING_TEXT_MODEL:-nomic-embed-text:v1.5}
      EMBEDDER_EMBEDDING_TEXT_DIMENSIONS: ${EMBEDDER_EMBEDDING_TEXT_DIMENSIONS:-768}
      EMBEDDER_EMBEDDING_TEXT_API_KEY: ${EMBEDDER_EMBEDDING_TEXT_API_KEY:-}
      EMBEDDER_EMBEDDING_CODE_PROVIDER: ${EMBEDDER_EMBEDDING_CODE_PROVIDER:-ollama}
      EMBEDDER_EMBEDDING_CODE_BASE_URL: ${EMBEDDER_EMBEDDING_CODE_BASE_URL:-http://ollama:11434}
      EMBEDDER_EMBEDDING_CODE_MODEL: ${EMBEDDER_EMBEDDING_CODE_MODEL:-nomic-embed-text:v1.5}
      EMBEDDER_EMBEDDING_CODE_DIMENSIONS: ${EMBEDDER_EMBEDDING_CODE_DIMENSIONS:-768}
      EMBEDDER_EMBEDDING_CODE_API_KEY: ${EMBEDDER_EMBEDDING_CODE_API_KEY:-}
      EMBEDDER_EMBEDDING_IMAGE_PROVIDER: ${EMBEDDER_EMBEDDING_IMAGE_PROVIDER:-ollama}
      EMBEDDER_EMBEDDING_IMAGE_BASE_URL: ${EMBEDDER_EMBEDDING_IMAGE_BASE_URL:-http://ollama:11434}
      EMBEDDER_EMBEDDING_IMAGE_MODEL: ${EMBEDDER_EMBEDDING_IMAGE_MODEL:-nomic-embed-text:v1.5}
      EMBEDDER_EMBEDDING_IMAGE_DIMENSIONS: ${EMBEDDER_EMBEDDING_IMAGE_DIMENSIONS:-768}
      EMBEDDER_EMBEDDING_IMAGE_API_KEY: ${EMBEDDER_EMBEDDING_IMAGE_API_KEY:-}
      EMBEDDER_EMBEDDING_PROFILES: '${EMBEDDER_EMBEDDING_PROFILES:-}'
      EMBEDDER_EMBEDDING_SELECTION: '${EMBEDDER_EMBEDDING_SELECTION:-}'
      EMBEDDER_OBJECT_STORAGE_PROVIDER: ${EMBEDDER_OBJECT_STORAGE_PROVIDER:-local}
      EMBEDDER_OBJECT_STORAGE_PREFIX: ${EMBEDDER_OBJECT_STORAGE_PREFIX:-uploads}
      EMBEDDER_UPLOAD_DIR: ${EMBEDDER_UPLOAD_DIR:-/tmp/embedder/uploads}
      EMBEDDER_LOG_LEVEL: ${EMBEDDER_LOG_LEVEL:-info}
      EMBEDDER_OLLAMA_BASE_URL: ${EMBEDDER_OLLAMA_BASE_URL:-http://ollama:11434}
      EMBEDDER_LLM_PROVIDER: ${EMBEDDER_LLM_PROVIDER:-ollama}
      EMBEDDER_LLM_BASE_URL: ${EMBEDDER_LLM_BASE_URL:-http://ollama:11434}
      EMBEDDER_LLM_MODEL: ${EMBEDDER_LLM_MODEL:-llama3.2:3b}
      EMBEDDER_LLM_API_KEY: ${EMBEDDER_LLM_API_KEY:-}
      EMBEDDER_GUARDRAILS_URL: ${EMBEDDER_GUARDRAILS_URL:-http://guardrails:8001}
      EMBEDDER_RCLONE_BINARY: /usr/bin/rclone
      EMBEDDER_RCLONE_CONFIG_DIR: /etc/cube/rclone
      EMBEDDER_RCLONE_TIMEOUT: ${EMBEDDER_RCLONE_TIMEOUT:-2m}
      EMBEDDER_RCLONE_PREFLIGHT: "false"
      EMBEDDER_OCR_ENABLED: ${EMBEDDER_OCR_ENABLED:-false}
      EMBEDDER_OCR_IMAGE_ENABLED: ${EMBEDDER_OCR_IMAGE_ENABLED:-true}
      EMBEDDER_OCR_PDF_FALLBACK_ENABLED: ${EMBEDDER_OCR_PDF_FALLBACK_ENABLED:-true}
      EMBEDDER_CHAT_TOP_K: ${EMBEDDER_CHAT_TOP_K:-8}
      EMBEDDER_CHUNK_SIZE: ${EMBEDDER_CHUNK_SIZE:-512}
      EMBEDDER_CHUNK_OVERLAP: ${EMBEDDER_CHUNK_OVERLAP:-64}
      EMBEDDER_INGEST_BATCH_SIZE: ${EMBEDDER_INGEST_BATCH_SIZE:-20}
      EMBEDDER_INGEST_MAX_CONCURRENCY: ${EMBEDDER_INGEST_MAX_CONCURRENCY:-4}
      EMBEDDER_INGEST_POLL_INTERVAL: ${EMBEDDER_INGEST_POLL_INTERVAL:-3s}
      EMBEDDER_INGEST_EMBED_BATCH_SIZE: ${EMBEDDER_INGEST_EMBED_BATCH_SIZE:-16}
    volumes:
      - cube-embedder-upload-volume:/tmp/embedder/uploads
      - ./rclone:/etc/cube/rclone:ro
    ports:
      - ${EMBEDDER_PORT:-8082}:8082

  cube-proxy:
    container_name: cube-proxy
    image: ghcr.io/ultravioletrs/cube/proxy:latest
    restart: on-failure
    networks:
      - cube-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      atom:
        condition: service_started
      cube-proxy-db:
        condition: service_healthy
      cube-agent:
        condition: service_started
      fluent-bit:
        condition: service_started
    environment:
      UV_CUBE_PROXY_LOG_LEVEL: ${UV_CUBE_PROXY_LOG_LEVEL:-info}
      UV_CUBE_AGENT_URL: ${UV_CUBE_AGENT_URL:-http://cube-agent:8901}
      UV_CUBE_PROXY_HOST: ${UV_CUBE_PROXY_HOST:-0.0.0.0}
      UV_CUBE_PROXY_PORT: ${UV_CUBE_PROXY_PORT:-8900}
      UV_CUBE_PROXY_SERVER_CERT: ${UV_CUBE_PROXY_SERVER_CERT:-}
      UV_CUBE_PROXY_SERVER_KEY: ${UV_CUBE_PROXY_SERVER_KEY:-}
      UV_CUBE_PROXY_INSTANCE_ID: ${UV_CUBE_PROXY_INSTANCE_ID:-}
      UV_CUBE_PROXY_ROUTER_CONFIG: ${UV_CUBE_PROXY_ROUTER_CONFIG:-/etc/cube/proxy/config.json}
      ATOM_GRPC_URL: ${ATOM_GRPC_URL:-atom:8081}
      ATOM_GRAPHQL_URL: ${ATOM_GRAPHQL_URL:-http://atom:8080/graphql}
      ATOM_TIMEOUT: ${ATOM_TIMEOUT:-15s}
      UV_CUBE_PROXY_DB_HOST: ${UV_CUBE_PROXY_DB_HOST:-cube-proxy-db}
      UV_CUBE_PROXY_DB_PORT: ${UV_CUBE_PROXY_DB_PORT:-5432}
      UV_CUBE_PROXY_DB_USER: ${UV_CUBE_PROXY_DB_USER:-cube}
      UV_CUBE_PROXY_DB_PASS: ${UV_CUBE_PROXY_DB_PASS:-cube}
      UV_CUBE_PROXY_DB_NAME: ${UV_CUBE_PROXY_DB_NAME:-cube-proxy}
      UV_CUBE_PROXY_DB_SSL_MODE: ${UV_CUBE_PROXY_DB_SSL_MODE:-disable}
      UV_CUBE_PROXY_SERVER_WRITE_TIMEOUT: ${UV_CUBE_PROXY_SERVER_WRITE_TIMEOUT:-10s}
      UV_CUBE_PROXY_SERVER_READ_TIMEOUT: ${UV_CUBE_PROXY_SERVER_READ_TIMEOUT:-10s}
      UV_CUBE_AGENT_SERVER_CA_CERTS: ${UV_CUBE_AGENT_SERVER_CA_CERTS:-/etc/cube/atom-certs/root-ca.crt}
      UV_CUBE_AGENT_ATTESTED_TLS: ${UV_CUBE_AGENT_ATTESTED_TLS:-false}
      UV_CUBE_AGENT_ATTESTATION_POLICY: ${UV_CUBE_AGENT_ATTESTATION_POLICY:-}
    volumes:
      - ./config.json:/etc/cube/proxy/config.json:ro
      - ./certs:/etc/cube/atom-certs:ro
    ports:
      - ${UV_CUBE_PROXY_PORT:-8900}:${UV_CUBE_PROXY_PORT:-8900}
    labels:
      logging: "cube-proxy"
      service: "proxy"

  ui:
    build:
      context: ../ui
      dockerfile: Dockerfile
    container_name: cube-ui
    restart: unless-stopped
    depends_on:
      cube-proxy:
        condition: service_started
      atom-ui:
        condition: service_started
    networks:
      - cube-network
    environment:
      CUBE_PROXY_TARGET: ${CUBE_PROXY_TARGET:-http://cube-proxy:8900}
      VITE_CUBE_PROXY_URL: ${VITE_CUBE_PROXY_URL:-http://localhost:${UI_PORT:-5173}}
      VITE_ATOM_API_URL: ${VITE_ATOM_API_URL:-http://localhost:${ATOM_HTTP_PORT:-8080}}
      VITE_ATOM_GRAPHQL_URL: ${VITE_ATOM_GRAPHQL_URL:-http://localhost:${ATOM_HTTP_PORT:-8080}/graphql}
      VITE_ATOM_UI_URL: ${VITE_ATOM_UI_URL:-http://localhost:${ATOM_UI_HTTP_PORT:-3005}}
    ports:
      - ${UI_PORT:-5173}:5173
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:5173/health >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
