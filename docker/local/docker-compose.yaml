# Minimal local development stack for Cube.
# No TEE/attestation, no Traefik, no guardrails, no audit pipeline.
# Services talk over the cube-net bridge and expose ports on localhost.

name: cube-local

networks:
  cube-net:
    driver: bridge

volumes:
  atom-db:
  proxy-db:
  embedder-db:
  embedder-uploads:
  ollama:

services:
  # ── Identity (ATOM) ────────────────────────────────────────────────
  atom-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ATOM_DB_USER}
      POSTGRES_PASSWORD: ${ATOM_DB_PASS}
      POSTGRES_DB: ${ATOM_DB_NAME}
    volumes:
      - atom-db:/var/lib/postgresql/data
    networks: [cube-net]
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER"']
      interval: 5s
      timeout: 5s
      retries: 10

  atom:
    image: ghcr.io/absmach/atom:latest
    restart: unless-stopped
    depends_on:
      atom-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${ATOM_DB_USER}:${ATOM_DB_PASS}@atom-db:5432/${ATOM_DB_NAME}
      LISTEN_ADDR: 0.0.0.0:8080
      GRPC_ADDR: 0.0.0.0:8081
      ADMIN_SECRET: ${ATOM_ADMIN_SECRET}
      ATOM_CERTS_ENABLED: "false"
      ATOM_SIGNUP_ENABLED: "true"
      ATOM_DEV_ALLOW_UNVERIFIED_EMAIL_LOGIN: "true"
      ATOM_CORS_ALLOWED_ORIGINS: http://localhost:${UI_PORT},http://localhost:${ATOM_UI_PORT}
      RUST_LOG: info
    ports:
      - ${ATOM_HTTP_PORT}:8080
      - ${ATOM_GRPC_PORT}:8081
    networks: [cube-net]

  atom-ui:
    image: ghcr.io/absmach/atom-ui:latest
    restart: unless-stopped
    depends_on:
      - atom
    environment:
      ATOM_GRAPHQL_URL: http://atom:8080/graphql
    ports:
      - ${ATOM_UI_PORT}:3000
    networks: [cube-net]

  # ── LLM backend (Ollama) ───────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama
    networks: [cube-net]

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull ${LLM_MODEL} && ollama pull ${EMBEDDING_MODEL}"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    networks: [cube-net]
    restart: "no"

  # ── Cube agent (plain HTTP, no attestation) ────────────────────────
  cube-agent:
    image: ghcr.io/ultravioletrs/cube/agent:${CUBE_TAG}
    restart: on-failure
    depends_on:
      - atom
      - ollama
    environment:
      UV_CUBE_AGENT_LOG_LEVEL: info
      UV_CUBE_AGENT_HOST: 0.0.0.0
      UV_CUBE_AGENT_PORT: "8901"
      UV_CUBE_AGENT_TARGET_URL: http://ollama:11434
      ATOM_GRPC_URL: atom:8081
      ATOM_GRAPHQL_URL: http://atom:8080/graphql
    networks: [cube-net]

  # ── Cube proxy ─────────────────────────────────────────────────────
  proxy-db:
    image: postgres:16-alpine
    restart: on-failure
    environment:
      POSTGRES_USER: ${PROXY_DB_USER}
      POSTGRES_PASSWORD: ${PROXY_DB_PASS}
      POSTGRES_DB: ${PROXY_DB_NAME}
    volumes:
      - proxy-db:/var/lib/postgresql/data
    networks: [cube-net]
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER"']
      interval: 5s
      timeout: 5s
      retries: 10

  cube-proxy:
    image: ghcr.io/ultravioletrs/cube/proxy:${CUBE_TAG}
    restart: on-failure
    depends_on:
      atom:
        condition: service_started
      proxy-db:
        condition: service_healthy
      cube-agent:
        condition: service_started
    environment:
      UV_CUBE_PROXY_LOG_LEVEL: info
      UV_CUBE_PROXY_HOST: 0.0.0.0
      UV_CUBE_PROXY_PORT: "8900"
      UV_CUBE_PROXY_ROUTER_CONFIG: /etc/cube/proxy/config.json
      UV_CUBE_AGENT_URL: http://cube-agent:8901
      UV_CUBE_AGENT_ATTESTED_TLS: "false"
      ATOM_GRPC_URL: atom:8081
      ATOM_GRAPHQL_URL: http://atom:8080/graphql
      UV_CUBE_PROXY_DB_HOST: proxy-db
      UV_CUBE_PROXY_DB_PORT: "5432"
      UV_CUBE_PROXY_DB_USER: ${PROXY_DB_USER}
      UV_CUBE_PROXY_DB_PASS: ${PROXY_DB_PASS}
      UV_CUBE_PROXY_DB_NAME: ${PROXY_DB_NAME}
      UV_CUBE_PROXY_DB_SSL_MODE: disable
    volumes:
      - ./config.json:/etc/cube/proxy/config.json:ro
    ports:
      - ${PROXY_PORT}:8900
    networks: [cube-net]

  # ── Cube embedder (RAG) ────────────────────────────────────────────
  embedder-db:
    image: pgvector/pgvector:pg16
    restart: on-failure
    environment:
      POSTGRES_USER: ${EMBEDDER_DB_USER}
      POSTGRES_PASSWORD: ${EMBEDDER_DB_PASS}
      POSTGRES_DB: ${EMBEDDER_DB_NAME}
    volumes:
      - embedder-db:/var/lib/postgresql/data
    networks: [cube-net]
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER"']
      interval: 5s
      timeout: 5s
      retries: 10

  cube-embedder:
    image: ghcr.io/ultravioletrs/cube/embedder:${CUBE_TAG}
    restart: on-failure
    depends_on:
      atom:
        condition: service_started
      embedder-db:
        condition: service_healthy
    environment:
      EMBEDDER_HTTP_ADDR: ":8082"
      EMBEDDER_LOG_LEVEL: info
      EMBEDDER_DB_URL: postgres://${EMBEDDER_DB_USER}:${EMBEDDER_DB_PASS}@embedder-db:5432/${EMBEDDER_DB_NAME}?sslmode=disable
      EMBEDDER_AUTH_GRPC_URL: atom:8081
      EMBEDDER_LLM_PROVIDER: ollama
      EMBEDDER_LLM_BASE_URL: http://ollama:11434
      EMBEDDER_LLM_MODEL: ${LLM_MODEL}
      EMBEDDER_OLLAMA_BASE_URL: http://ollama:11434
      EMBEDDER_EMBEDDING_DEFAULT_PROFILE: text
      EMBEDDER_EMBEDDING_TEXT_PROVIDER: ollama
      EMBEDDER_EMBEDDING_TEXT_BASE_URL: http://ollama:11434
      EMBEDDER_EMBEDDING_TEXT_MODEL: ${EMBEDDING_MODEL}
      EMBEDDER_EMBEDDING_TEXT_DIMENSIONS: "768"
      EMBEDDER_OBJECT_STORAGE_PROVIDER: local
      EMBEDDER_UPLOAD_DIR: /tmp/embedder/uploads
    volumes:
      - embedder-uploads:/tmp/embedder/uploads
    ports:
      - ${EMBEDDER_PORT}:8082
    networks: [cube-net]

  # ── Web UI ─────────────────────────────────────────────────────────
  ui:
    build:
      context: ../../ui
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - cube-proxy
      - atom-ui
    environment:
      CUBE_PROXY_TARGET: http://cube-proxy:8900
      VITE_CUBE_PROXY_URL: http://localhost:${UI_PORT}
      VITE_ATOM_API_URL: http://localhost:${ATOM_HTTP_PORT}
      VITE_ATOM_GRAPHQL_URL: http://localhost:${ATOM_HTTP_PORT}/graphql
      VITE_ATOM_UI_URL: http://localhost:${ATOM_UI_PORT}
    ports:
      - ${UI_PORT}:5173
    networks: [cube-net]
